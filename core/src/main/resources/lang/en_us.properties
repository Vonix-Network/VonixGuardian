# VonixGuardian — English (en_US) message bundle
#
# Format: MessageFormat (java.text.MessageFormat).
#   Placeholders: {0}, {1}, ... — literal '{' must be escaped as ''{''
#   Single quotes must be doubled: '' — see MessageFormat javadoc.
#
# Scope (v1.2.0): player-facing chat feedback only. Log strings stay in code.
# Missing keys fall back to the key itself — safe, but ugly. Do not delete keys.

# ---- QueryParser (/vg lookup <filter>) player errors ------------------------
query.error.expected_prefix         = expected ''<prefix>:<value>'' (u:, t:, r:, a:, i:, e:) or #flag
query.error.unknown_prefix          = unknown prefix ''{0}:'' \u2014 expected one of u: t: r: a: i: e:
query.error.user_empty              = u: requires at least one player name or #sentinel
query.error.user_empty_entry        = u: contains an empty entry \u2014 remove the stray comma
query.error.user_invalid_name       = ''{0}'' is not a valid player name (letters, digits, underscore; max 16) \u2014 did you mean a #sentinel?
query.error.time_required           = t: requires a duration like 1h, 2w5d, or 1h-2h
query.error.time_range_both_sides   = t: range requires durations on both sides of ''-'' (e.g. 1h-2h)
query.error.duration_no_number      = duration component must start with a number: ''{0}''
query.error.duration_missing_unit   = duration ''{0}'' is missing a unit (use one of s, m, h, d, w)
query.error.duration_bad_number     = duration ''{0}'' has invalid number ''{1}''
query.error.duration_unknown_unit   = unknown duration unit ''{0}'' in ''{1}'' \u2014 use s, m, h, d, or w
query.error.duration_empty          = empty duration
query.error.radius_required         = r: requires a radius (e.g. r:10, r:#global, r:#world_nether)
query.error.radius_not_integer      = radius must be a non-negative integer or a #keyword, got ''{0}''
query.error.radius_negative         = radius must be >= 0 (got {0}) \u2014 use r:#global for unbounded
query.error.radius_no_position      = r:<n> requires a player position; console must use r:#global or r:#world_<key>
query.error.action_required         = a: requires an action name \u2014 {0}
query.error.action_unknown          = unknown action ''{0}'' \u2014 {1}
query.error.ident_empty             = {0} requires at least one identifier
query.error.ident_empty_entry       = {0} contains an empty entry \u2014 remove the stray comma
query.error.ident_bad_namespace     = invalid namespace ''{0}'' in identifier ''{1}''
query.error.ident_bad_path          = invalid identifier path ''{0}'' in ''{1}''
query.error.flag_unknown            = unknown flag ''{0}'' \u2014 valid flags: #preview, #count, #verbose, #silent, #optimize
query.error.bad_token_wrap          = bad token ''{0}'': {1}

# ---- /vg status section headers --------------------------------------------
status.section.guardian             = VonixGuardian
status.section.storage              = Storage
status.section.queue                = Writer queue
status.section.hooks                = Event hooks
status.section.permissions          = Permissions
status.section.public_api           = Public API
query.error.worldedit_not_installed = WorldEdit is not installed \u2014 r:#we / r:#worldedit requires WorldEdit on the server
query.error.worldedit_no_selection  = you have no active WorldEdit selection \u2014 make a selection with //wand first
