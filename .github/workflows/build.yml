name: build
on:
  push:
    branches: [main, "release/**"]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-core-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle*') }}
      - run: ./gradlew :core:test --no-daemon -PbuildProfile=core
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: core-test-reports
          path: core/build/reports/tests/test/

  jars:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      fail-fast: false
      matrix:
        include:
          - { module: 'mc-1.21.1:neoforge', profile: 'mc1211', jdk: '21' }
          - { module: 'mc-1.21.1:fabric',   profile: 'mc1211', jdk: '21' }
          - { module: 'mc-1.20.1:fabric',   profile: 'mc1201', jdk: '17' }
          - { module: 'mc-1.20.1:forge',    profile: 'mc1201', jdk: '17' }
          - { module: 'mc-1.19.2:fabric',   profile: 'mc1192', jdk: '17' }
          - { module: 'mc-1.19.2:forge',    profile: 'mc1192', jdk: '17' }
          - { module: 'mc-1.18.2:fabric',   profile: 'mc1182', jdk: '17' }
          - { module: 'mc-1.18.2:forge',    profile: 'mc1182', jdk: '17' }
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.module }}-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle*') }}
      - run: ./gradlew :${{ matrix.module }}:build -PbuildProfile=${{ matrix.profile }} --no-daemon
      - name: Identify jar
        id: jar
        run: |
          MOD_PATH="${{ matrix.module }}"
          MOD_PATH="${MOD_PATH//:/\/}"
          JAR=$(find "$MOD_PATH" -name 'vonixguardian-*-0.1.0.jar' ! -name '*sources*' ! -name '*slim*' ! -name '*shadow*' | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR)" >> $GITHUB_OUTPUT
          # Sanitize artifact name: colon is forbidden in upload-artifact@v4 (NTFS portability)
          SAFE_NAME="${{ matrix.module }}"
          SAFE_NAME="${SAFE_NAME//:/-}"
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jar.outputs.safe_name }}-jar
          path: ${{ steps.jar.outputs.path }}
          retention-days: 30
